# ─────────────────────────────────────────────────
# GRC Nginx Configuration
#
# Routing:
#   /api/*, /a2a/*, /auth/*  → grc-server:3100 (Backend API)
#   /admin/*                 → grc-dashboard:80 (Admin SPA, Phase 3)
#   /health                  → grc-server:3100 (Health check)
# ─────────────────────────────────────────────────

upstream grc_api {
    server grc-server:3100;
    keepalive 32;
}

# Phase 3: Uncomment when dashboard container is deployed
# upstream grc_dashboard {
#     server grc-dashboard:80;
# }

server {
    listen 80;
    server_name grc.winclawhub.ai;

    # Redirect HTTP to HTTPS in production
    # Uncomment when TLS certs are available:
    # return 301 https://$host$request_uri;

    # For development / initial deployment without TLS:
    include /etc/nginx/conf.d/grc-locations.conf*;
}

# Uncomment for HTTPS (production):
# server {
#     listen 443 ssl http2;
#     server_name grc.winclawhub.ai;
#
#     ssl_certificate /etc/nginx/certs/fullchain.pem;
#     ssl_certificate_key /etc/nginx/certs/privkey.pem;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#
#     include /etc/nginx/conf.d/grc-locations.conf*;
# }

# ── Location blocks (shared between HTTP and HTTPS) ──
# This is included inline since we can't use include for a non-existent file.
# In practice, copy these locations into both server blocks.

# Backend API routes
location /api/ {
    proxy_pass http://grc_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Request size limit (for skill tarball uploads)
    client_max_body_size 50m;
}

# A2A Protocol routes
location /a2a/ {
    proxy_pass http://grc_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    client_max_body_size 10m;
}

# Auth routes (OAuth callbacks)
location /auth/ {
    proxy_pass http://grc_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

# Health check
location /health {
    proxy_pass http://grc_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}

