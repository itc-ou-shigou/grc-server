# ─────────────────────────────────────────────────
# GRC Docker Compose — Modular Monolith Deployment
#
# Services:
#   grc-server     — Express API (all 6 modules)
#   mysql          — MySQL 8.0 database
#   redis          — Cache + session store
#   minio          — S3-compatible object storage (skill tarballs)
#   meilisearch    — Full-text search engine
#   nginx          — TLS termination + reverse proxy
# ─────────────────────────────────────────────────

version: "3.8"

services:
  # ── GRC Server (Modular Monolith) ────────────────
  grc-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grc-server
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
      - DATABASE_URL=mysql://grc:${MYSQL_PASSWORD:-grc_secret}@mysql:3306/grc-server
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=grc-assets
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-grc-meili-key}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ISSUER=grc.winclawhub.ai
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_CALLBACK_URL=https://grc.winclawhub.ai/auth/github/callback
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=https://grc.winclawhub.ai/auth/google/callback
      - GRC_MODULE_AUTH=true
      - GRC_MODULE_CLAWHUB=true
      - GRC_MODULE_EVOLUTION=true
      - GRC_MODULE_UPDATE=true
      - GRC_MODULE_TELEMETRY=true
      - GRC_MODULE_COMMUNITY=false
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── MySQL 8.0 ────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: grc-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=grc-server
      - MYSQL_USER=grc
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-grc_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/shared/db/migrations:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MinIO (S3-compatible storage) ────────────────
  minio:
    image: minio/minio:latest
    container_name: grc-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"  # Console
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ── Meilisearch (Full-text search) ───────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: grc-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-grc-meili-key}
      - MEILI_ENV=production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Nginx (Reverse Proxy + TLS) ──────────────────
  nginx:
    image: nginx:alpine
    container_name: grc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount TLS certs here for production
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - grc-server

volumes:
  mysql_data:
  redis_data:
  minio_data:
  meili_data:
